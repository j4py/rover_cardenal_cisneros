<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rover Command Center</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css?v=1.3" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style type="text/tailwindcss">
    @layer utilities {
        .glass-panel {
          @apply bg-slate-900/80 backdrop-blur-md border border-slate-700/50 rounded-2xl p-4 shadow-xl;
        }
        .btn-control {
          @apply px-4 py-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 rounded-lg border border-slate-700 text-slate-200 transition-colors flex items-center justify-center gap-2;
        }
        .btn-primary {
          @apply px-4 py-2 bg-orange-600 hover:bg-orange-500 active:bg-orange-700 rounded-lg text-white font-semibold transition-colors shadow-lg shadow-orange-900/20;
        }
        .btn-danger {
          @apply px-4 py-2 bg-red-600 hover:bg-red-500 active:bg-red-700 rounded-lg text-white font-bold transition-colors shadow-lg shadow-red-900/20 uppercase tracking-widest;
        }
      }
      /* Custom map marker pulse */
      .rover-marker-icon {
        background-color: #f97316;
        border: 2px solid white;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
      }
    </style>

  <!-- Dependencies -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
  <script src="mqtt.js"></script>

  <!-- Components -->
  <script type="text/babel" src="components/NavBar.js?v=2.2"></script>
  <script type="text/babel" src="components/Dashboard/VideoHud.js?v=3.5"></script>
  <script type="text/babel" src="components/Dashboard/MapPanel.js?v=1.4"></script>
  <script type="text/babel" src="components/Dashboard/JoystickPanel.js?v=2.3"></script>
  <script type="text/babel" src="components/Dashboard/SystemStatus.js?v=1.5"></script>
</head>

<body
  class="bg-slate-950 text-slate-200 font-['Outfit'] min-h-screen lg:h-screen lg:overflow-hidden flex flex-col bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
  <div id="root" class="flex-1 flex flex-col h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Mock MQTT / System Context
    // En producciÃ³n esto irÃ­a en un archivo separado o ContextProvider
    function useMqttSystem() {
      const [mqttStatus, setMqttStatus] = useState(false);
      const [wifiStatus, setWifiStatus] = useState(false);
      const [gpsStatus, setGpsStatus] = useState(false);
      const [telemetry, setTelemetry] = useState({
        lat: 37.383472,
        lon: -2.142056,
        heading: 0,
        battery: 0,
        battery_pct: 0,
        speed: 0,
        mode: 'MANUAL',
        auto: false
      });

      // Ref to hold client instance so we can use it in sendCommand
      const clientRef = useRef(null);
      const wifiTimerRef = useRef(null);
      const gpsTimerRef = useRef(null);
      const [camStatus, setCamStatus] = React.useState({
        state: "OFFLINE", mode: null, rssi: null,
        ram_kb: null, frames_sent: 0, frames_failed: 0, ws: false
      });
      const camOfflineTimerRef = React.useRef(null);

      // Helpers to refresh status with 2s timeout
      const refreshWifi = () => {
        if (wifiTimerRef.current) clearTimeout(wifiTimerRef.current);
        setWifiStatus(true);
        wifiTimerRef.current = setTimeout(() => setWifiStatus(false), 2000);
      };

      const refreshGps = () => {
        if (gpsTimerRef.current) clearTimeout(gpsTimerRef.current);
        setGpsStatus(true);
        gpsTimerRef.current = setTimeout(() => setGpsStatus(false), 2000);
      };

      useEffect(() => {
        const { HOST, PORT, PATH, USERNAME, PASSWORD } = window.MQTT_CONFIG;
        const CLIENT_ID = "CommandCenter_" + Math.random().toString(16).substr(2, 8);

        console.log(`[MQTT] Connecting to ${HOST}:${PORT}${PATH} as ${CLIENT_ID}...`);

        // IMPORTANTE: Constructor con 4 parÃ¡metros
        const client = new Paho.MQTT.Client(HOST, PORT, PATH, CLIENT_ID);
        clientRef.current = client;

        const onConnect = () => {
          console.log("[MQTT] Connected!");
          setMqttStatus(true);

          // Subscribe to topics
          client.subscribe("rover/status");    // General status (WiFi, GPS fix, etc)
          client.subscribe("rover/telemetry"); // High frequency data (Battery, location)
          client.subscribe("rover/mode");      // Mode updates
          client.subscribe("rover/cam/status");
        };

        const onConnectionLost = (responseObject) => {
          console.warn("[MQTT] Connection Lost:", responseObject.errorMessage);
          setMqttStatus(false);
          setWifiStatus(false);
          setGpsStatus(false);
        };

        const onMessageArrived = (message) => {
          const topic = message.destinationName;
          let payload;
          let isJson = true;

          try {
            payload = JSON.parse(message.payloadString);
          } catch (e) {
            isJson = false;
            payload = message.payloadString;
          }

          // Cada vez que recibimos telemetrÃ­a o status, significa que hay WiFi
          if (topic === "rover/telemetry" || topic === "rover/status") {
            refreshWifi();
          }

          if (topic === "rover/status" && isJson) {
            if (payload.gps === true) refreshGps();
            else if (payload.gps === false) {
              if (gpsTimerRef.current) clearTimeout(gpsTimerRef.current);
              setGpsStatus(false);
            }
          }
          else if (topic === "rover/telemetry" && isJson) {
            // Si llega telemetrÃ­a con coordenadas vÃ¡lidas, refrescamos GPS tmb
            if (payload.lat && payload.lon) refreshGps();
            setTelemetry(prev => ({ ...prev, ...payload }));
          }
          else if (topic === "rover/mode") {
            const modeVal = (isJson && payload.mode) ? payload.mode : payload;
            const isAuto = /AUTO|GPS/i.test(String(modeVal));
            setTelemetry(prev => ({ ...prev, mode: modeVal, auto: isAuto }));
          }
          else if (topic === "rover/cam/status" && isJson) {
            if (camOfflineTimerRef.current) clearTimeout(camOfflineTimerRef.current);

            const { ws, rssi, frames_sent, frames_failed } = payload;
            let state = "CONNECTING";
            if (ws) {
              const failRatio = frames_sent > 0 ? frames_failed / frames_sent : 0;
              state = (rssi < -80 || failRatio > 0.05) ? "DEGRADED" : "STREAMING";
            }

            setCamStatus({ ...payload, state });

            camOfflineTimerRef.current = setTimeout(() => {
              setCamStatus(prev => ({ ...prev, state: "OFFLINE" }));
            }, 10000);
          }
        };

        client.onConnectionLost = onConnectionLost;
        client.onMessageArrived = onMessageArrived;

        // Connect options
        const options = {
          useSSL: true, // WSS
          userName: USERNAME,
          password: PASSWORD,
          keepAliveInterval: 20, // Ping cada 20s para evitar cortes de Nginx
          onSuccess: onConnect,
          onFailure: (e) => {
            console.error("[MQTT] Connect Failed:", e);
            setMqttStatus(false);
          }
        };

        try {
          client.connect(options);
        } catch (e) {
          console.error("[MQTT] Client Init Error:", e);
        }

        // Cleanup
        return () => {
          if (camOfflineTimerRef.current) clearTimeout(camOfflineTimerRef.current);
          if (client.isConnected()) {
            console.log("[MQTT] Disconnecting...");
            client.disconnect();
          }
        };
      }, []);

      const sendCommand = (topic, payload) => {
        if (clientRef.current && clientRef.current.isConnected()) {
          // If payload is object, stringify it
          const payloadStr = typeof payload === 'object' ? JSON.stringify(payload) : String(payload);
          const message = new Paho.MQTT.Message(payloadStr);
          message.destinationName = topic;
          clientRef.current.send(message);
          console.log(`[MQTT] Sent to ${topic}: ${payloadStr}`);
        } else {
          console.warn("[MQTT] Cannot send: Not connected");
        }
      };

      // Cambia el modo y refleja el estado al instante; gps.ino confirma el estado REAL en su telemetrÃ­a
      const commandMode = (mode) => {
        const isAuto = /AUTO|GPS/i.test(String(mode));
        setTelemetry(prev => ({ ...prev, auto: isAuto }));
        sendCommand('rover/mode', mode);
      };

      return { mqttStatus, wifiStatus, gpsStatus, telemetry, camStatus, sendCommand, commandMode };
    }

    function App() {
      const { mqttStatus, wifiStatus, gpsStatus, telemetry, camStatus, sendCommand, commandMode } = useMqttSystem();
      const [targetPos, setTargetPos] = useState(null);

      const handleEmergencyStop = () => {
        console.warn("PARADA DE EMERGENCIA ACTIVADA");
        sendCommand('rover/cmd', 'STOP');
      };

      return (
        <div className="flex flex-col h-full relative">
          {/* Header / Nav */}
          <div className="z-50 shrink-0">
            <NavBar basePath="./" isDashboard={false} />
          </div>

          {/* Main Grid */}
          <main className="flex-1 p-1 grid grid-cols-12 lg:grid-rows-6 gap-2 lg:overflow-hidden">

            {/* Left Column: Video & Controls (8 cols) */}
            <div className="col-span-12 lg:col-span-8 row-span-4 lg:row-span-6 flex flex-col gap-4">

              {/* Video HUD Area */}
              <div className="flex-1 min-h-[50vh] lg:min-h-0 relative rounded-2xl overflow-hidden bg-black border border-slate-800 shadow-2xl">
                {/* Video Component */}
                <VideoHud
                  telemetry={telemetry}
                  camStatus={camStatus}
                  onGimbalMove={(axis, val) => sendCommand(`rover/gimbal/${axis}`, val)}
                />
              </div>

              {/* Bottom Quick Controls (Mobile/Tablet usually) */}
              <div className="h-64 lg:h-48 glass-panel flex items-center justify-center">
                <JoystickPanel onMove={(data) => sendCommand('rover/move', data)} />
              </div>
            </div>

            {/* Right Column: Map & Status (4 cols) */}
            <div className="col-span-12 lg:col-span-4 row-span-2 lg:row-span-6 flex flex-col gap-4">

              {/* System Status Top Card */}
              <div className="h-auto">
                <SystemStatus
                  mqttStatus={mqttStatus}
                  wifiStatus={wifiStatus}
                  gpsStatus={gpsStatus}
                  battery={telemetry.battery}
                  batteryPct={telemetry.battery_pct}
                  mode={telemetry.mode}
                  autoMode={telemetry.auto}
                  ip={telemetry.ip}
                  ip_gps={telemetry.ip_gps}
                  ip_cam={telemetry.ip_cam}
                  onEmergency={handleEmergencyStop}
                  /* rover/mode payload: 'AUTO' | 'MANUAL' (gps.ino lo normaliza a mayÃºsculas) */
                  onModeToggle={commandMode}
                  gps_state={telemetry.gps_state}
                  gps_sats={telemetry.gps_sats}
                />
              </div>

              {/* Map Panel */}
              <div className="flex-1 glass-panel p-0 overflow-hidden relative min-h-[300px]">
                <MapPanel
                  position={[telemetry.lat, telemetry.lon]}
                  heading={telemetry.heading}
                  target={targetPos}
                  gpsState={telemetry.gps_state}
                  onSetTarget={(latlng) => {
                    setTargetPos(latlng);
                    sendCommand('rover/target', latlng);
                  }}
                />
              </div>



            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
