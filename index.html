<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rover Perseverance — IES Cardenal Cisneros</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="components/NavBar.js?v=2.2"></script>
    <script type="text/babel">
      const { useState } = React;

      const SPECS = [
        { label: "Sensores",   value: "GPS · CAM · LiDAR" },
        { label: "Navegación", value: "GPS + Brújula" },
        { label: "Vídeo",      value: "20 FPS · WS" },
        { label: "Dirección",  value: "Ackermann" },
        { label: "Batería",    value: "LiPo 3S" },
        { label: "Red",        value: "Cloudflare" },
        { label: "Control",    value: "PWM 200 Hz" },
        { label: "Curso",      value: "2025 / 2026" },
      ];

      const TEAM = [
        {
          initials: "MA",
          name: "Marcelo Alejandro Huayhua Moreno",
          role: "Cámara & Vídeo",
          detail: "ESP32-CAM, streaming WebSocket, gimbal de visión.",
          href: "sensores/camara.html",
          gradient: "from-orange-600 to-orange-500",
        },
        {
          initials: "JJ",
          name: "Juan José Naranjo Lobato",
          role: "LiDAR & Obstáculos",
          detail: "Integración del sensor LiDAR y algoritmos de mapeo.",
          href: "sensores/lidar.html",
          gradient: "from-amber-700 to-amber-500",
        },
        {
          initials: "OM",
          name: "Oliver Mignemi Martos",
          role: "Hardware · Control · Infraestructura",
          detail: "6WD, servos, firmware principal, MQTT, red y plataforma web.",
          href: "hardware/traccion.html",
          gradient: "from-red-900 to-orange-700",
        },
        {
          initials: "MO",
          name: "Marc Oliva Marqués",
          role: "GPS & Navegación",
          detail: "Módulo GPS, brújula magnetométrica y algoritmos de ruta.",
          href: "sensores/gps.html",
          gradient: "from-slate-600 to-slate-500",
        },
      ];

      const FEATURES = [
        {
          title: "TRACCIÓN 6WD · ACKERMANN",
          desc: "6 motores DC, 4 servos de dirección, cinemática diferencial para giros en sitio.",
          accent: "#f97316",
        },
        {
          title: "CONTROL MQTT EN TIEMPO REAL",
          desc: "Latencia mínima, tópicos independientes por subsistema, telemetría de estado en tiempo real.",
          accent: "#d97706",
        },
        {
          title: "GPS & BRÚJULA MAGNETOMÉTRICA",
          desc: "Posición en mapa Leaflet.js actualizada en tiempo real con heading y coordenadas.",
          accent: "#f97316",
        },
        {
          title: "CÁMARA · GIMBAL MOTORIZADO",
          desc: "ESP32-CAM con stepper NEMA 17 (yaw) y servo (pitch), streaming WebSocket a 20 FPS.",
          accent: "#d97706",
        },
      ];

      /* ── COMPONENTS ── */

      function DataCell({ label, value, dim }) {
        return (
          <div className="flex flex-col items-center gap-1 py-3 px-5 border-r border-slate-800 last:border-r-0 text-center">
            <span className="text-[11px] text-slate-500 uppercase tracking-[2px] font-mono">{label}</span>
            <span className={`text-base font-bold font-mono ${dim ? "text-amber-400" : "text-orange-400"}`}>
              {value}
            </span>
          </div>
        );
      }

      function SpecCell({ label, value }) {
        return (
          <div className="flex flex-col items-center gap-1 py-3 px-4 border-r border-slate-800 last:border-r-0 text-center">
            <span className="text-[10px] text-slate-500 uppercase tracking-[2px] font-mono">{label}</span>
            <span className="text-xs font-bold text-orange-400 font-mono">{value}</span>
          </div>
        );
      }

      function FeatureItem({ title, desc, accent }) {
        return (
          <div
            className="p-4 bg-slate-900 border border-slate-800 rounded"
            style={{ borderLeftWidth: "2px", borderLeftColor: accent }}
          >
            <p className="text-xs font-bold text-slate-200 font-mono tracking-wide mb-1.5">{title}</p>
            <p className="text-xs text-slate-500 leading-relaxed">{desc}</p>
          </div>
        );
      }

      function TeamCard({ initials, name, role, detail, href, gradient }) {
        return (
          <a
            href={href}
            className="group flex gap-3.5 items-start p-4 bg-slate-900 border border-slate-800 rounded hover:border-orange-500/30 transition-colors"
          >
            <div
              className={`w-11 h-11 shrink-0 rounded bg-gradient-to-br ${gradient} flex items-center justify-center text-white font-bold text-sm font-mono shadow`}
            >
              {initials}
            </div>
            <div className="flex-1 min-w-0">
              <p className="text-[10px] font-bold text-orange-400 uppercase tracking-[2px] font-mono mb-0.5">{role}</p>
              <h3 className="font-semibold text-slate-100 text-sm leading-snug mb-1.5 group-hover:text-white transition-colors">
                {name}
              </h3>
              <p className="text-xs text-slate-500 leading-relaxed border-l border-slate-700 pl-2.5 group-hover:border-orange-500/40 transition-colors">
                {detail}
              </p>
            </div>
          </a>
        );
      }

      /* ── APP ── */

      function App() {
        return (
          <div className="flex flex-col min-h-screen bg-slate-950 text-slate-200 font-sans">
            <NavBar basePath="./" />

            <main className="flex-1">

              {/* ── HERO ── */}
              <section className="relative overflow-hidden pt-20 pb-16 px-4 text-center">
                <div
                  className="absolute -top-20 left-1/2 -translate-x-1/2 w-[500px] h-[300px] pointer-events-none"
                  style={{ background: "radial-gradient(ellipse, rgba(249,115,22,0.12) 0%, transparent 70%)" }}
                />

                <div className="relative max-w-4xl mx-auto">
                  {/* eyebrow tag */}
                  <div className="mb-6">
                    <span className="inline-block text-xs font-bold text-orange-400 uppercase tracking-[3px] bg-orange-500/10 border border-orange-500/20 rounded-sm px-4 py-1.5 font-mono">
                      IES Cardenal Cisneros · 2DO SMR · Proyecto Intermodular 25/26
                    </span>
                  </div>

                  {/* title */}
                  <h1
                    className="font-black text-white leading-[0.9] mb-5"
                    style={{ fontSize: "clamp(52px, 10vw, 88px)", letterSpacing: "-2px" }}
                  >
                    ROVER<br />
                    <span className="text-orange-500">PERSEVERANCE</span>
                  </h1>

                  <p className="text-base text-slate-500 max-w-xl mx-auto leading-relaxed mb-8">
                    Rover de 6 ruedas motrices controlado en tiempo real vía MQTT, con GPS, cámara con gimbal y sensor LiDAR — operado desde cualquier dispositivo, en cualquier lugar del mundo.
                  </p>

                  {/* data bar */}
                  <div className="inline-grid grid-cols-2 md:grid-cols-4 bg-slate-900 border border-slate-800 rounded overflow-hidden mb-8">
                    <DataCell label="Tracción"  value="6WD" />
                    <DataCell label="Protocolo" value="MQTT" />
                    <DataCell label="ESP32"     value="×4" dim />
                    <DataCell label="Alcance"   value="GLOBAL" dim />
                  </div>

                  {/* CTAs */}
                  <div className="flex flex-wrap items-center justify-center gap-2.5">
                    <a href="control.html"
                      className="bg-orange-600 hover:bg-orange-500 text-white text-xs font-bold px-5 py-2.5 rounded tracking-wider transition-colors">
                      ▶ CENTRO DE MANDO
                    </a>
                    <a href="software/firmware.html"
                      className="border border-slate-700 hover:border-slate-600 text-slate-400 hover:text-slate-300 text-xs font-semibold px-5 py-2.5 rounded transition-colors">
                      Firmware ESP32
                    </a>
                    <a href="docs/guia.html"
                      className="border border-slate-700 hover:border-slate-600 text-slate-400 hover:text-slate-300 text-xs font-semibold px-5 py-2.5 rounded transition-colors">
                      Manual de Uso
                    </a>
                    <a href="test.html"
                      className="border border-amber-900/60 hover:border-amber-800 text-amber-600 hover:text-amber-500 text-xs font-semibold px-5 py-2.5 rounded transition-colors">
                      Test Deck
                    </a>
                  </div>
                </div>
              </section>

              {/* ── SPECS STRIP ── */}
              <section className="border-y border-slate-800">
                <div className="max-w-5xl mx-auto">
                  <div className="grid grid-cols-4 md:grid-cols-8">
                    {SPECS.map((s) => (
                      <SpecCell key={s.label} {...s} />
                    ))}
                  </div>
                </div>
              </section>

              {/* ── ABOUT ── */}
              <section className="py-16 px-4">
                <div className="max-w-5xl mx-auto grid md:grid-cols-2 gap-12 items-start">

                  <div>
                    <h2 className="text-xl font-bold text-white mb-4 tracking-tight">Sobre el proyecto</h2>
                    <div className="space-y-3 text-sm text-slate-500 leading-relaxed">
                      <p>
                        El <span className="text-slate-300 font-medium">Rover Perseverance</span> es un vehículo todo-terreno de 6 ruedas motrices diseñado y construido por alumnos de 2º SMR. Cuatro ESP32 independientes dividen la responsabilidad: tracción y firmware principal, transmisión de vídeo en tiempo real, lectura de GPS con brújula magnetométrica, y mapeo con LiDAR.
                      </p>
                      <p>
                        Toda la comunicación pasa por un <span className="text-slate-300 font-medium">broker MQTT</span> en servidor propio, con acceso global mediante <span className="text-slate-300 font-medium">Cloudflare Tunnel</span>. Esta misma interfaz actúa como Centro de Mando desde cualquier dispositivo.
                      </p>
                      <p>
                        La dirección usa geometría <span className="text-slate-300 font-medium">Ackermann</span> con 4 servos de steering, alimentado por una <span className="text-slate-300 font-medium">LiPo 3S (11.1 V)</span> con convertidores step-down independientes para lógica y actuadores.
                      </p>
                    </div>
                  </div>

                  <div className="space-y-2">
                    {FEATURES.map((f) => (
                      <FeatureItem key={f.title} {...f} />
                    ))}
                  </div>
                </div>
              </section>

              {/* ── TEAM ── */}
              <section className="py-14 px-4 border-t border-slate-800">
                <div className="max-w-5xl mx-auto">
                  <div className="mb-8">
                    <p className="text-[10px] font-bold text-orange-400 uppercase tracking-[3px] font-mono mb-1">// EQUIPO DE DESARROLLO</p>
                    <h2 className="text-xl font-bold text-white">Integrantes del proyecto</h2>
                  </div>
                  <div className="grid md:grid-cols-2 gap-3">
                    {TEAM.map((m) => (
                      <TeamCard key={m.name} {...m} />
                    ))}
                  </div>
                </div>
              </section>

            </main>

            <footer className="border-t border-slate-800 px-4 py-5 flex flex-col sm:flex-row items-center justify-between gap-2 font-mono text-xs text-slate-600 tracking-wider">
              <span>ROVER <span className="text-orange-500/60">PERSEVERANCE</span> · PROYECTO INTERMODULAR 2025/26</span>
              <span>IES CARDENAL CISNEROS · 2DO SMR</span>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
