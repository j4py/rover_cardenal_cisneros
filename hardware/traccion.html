<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracción 6WD | Rover Perseverance</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css" />
    <script type="text/babel" src="../components/NavBar.js?v=2.2"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 font-sans min-h-screen selection:bg-orange-500/30">
    <div id="root"></div>

    <script type="text/babel">
      function Section({ id, title, icon, color = "text-orange-400", bg = "bg-orange-500/10", children }) {
        return (
          <section id={id} className="scroll-mt-20">
            <h2 className="text-2xl font-bold text-white mb-5 flex items-center gap-3">
              <span className={`${bg} ${color} p-2 rounded`}>{icon}</span>
              {title}
            </h2>
            {children}
          </section>
        );
      }

      function SpecRow({ label, val }) {
        return (
          <tr className="border-b border-slate-800/60">
            <td className="py-2 pr-4 text-slate-500 text-sm font-medium w-36">{label}</td>
            <td className="py-2 text-slate-300 text-sm font-mono">{val}</td>
          </tr>
        );
      }

      function PinRow({ pin, signal, desc, color = "text-orange-400" }) {
        return (
          <tr className="border-b border-slate-800 hover:bg-slate-800/30 transition-colors">
            <td className={`py-2 px-3 font-mono text-sm font-bold ${color}`}>{pin}</td>
            <td className="py-2 px-3 font-mono text-xs text-slate-300">{signal}</td>
            <td className="py-2 px-3 text-xs text-slate-400">{desc}</td>
          </tr>
        );
      }

      function App() {
        return (
          <div className="flex flex-col min-h-screen">
            <NavBar basePath="../" />

            <div className="max-w-4xl mx-auto px-4 py-10 w-full flex-1">
              <header className="mb-10 border-b border-slate-800 pb-8">
                <div className="flex items-center gap-3 mb-3">
                  <span className="text-[11px] font-bold text-orange-400 uppercase tracking-widest bg-orange-500/10 border border-orange-500/20 rounded-sm px-3 py-1">Hardware · Tracción & Dirección</span>
                  <span className="text-[11px] text-slate-500">Oliver Mignemi Martos</span>
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-white mb-3 tracking-tight">
                  Tracción <span className="text-orange-400">6WD</span>
                </h1>
                <p className="text-lg text-slate-400 max-w-2xl">
                  Seis ruedas motrices con dirección Ackermann de 4 esquinas y gimbal de cámara motorizado.
                </p>

                {/* Stats strip */}
                <div className="grid grid-cols-4 gap-3 mt-6">
                  {[
                    { label: "Motores DC", val: "×6" },
                    { label: "Drivers H-Bridge", val: "×3" },
                    { label: "Servos dirección", val: "×4" },
                    { label: "Stepper gimbal", val: "×1" },
                  ].map(s => (
                    <div key={s.label} className="bg-slate-900/50 border border-slate-800 rounded px-3 py-2.5 text-center">
                      <p className="text-[10px] text-slate-500 uppercase tracking-wider font-mono mb-1">{s.label}</p>
                      <p className="text-xl font-black text-orange-400 font-mono">{s.val}</p>
                    </div>
                  ))}
                </div>
              </header>

              <div className="space-y-14">

                {/* Motores DC */}
                <Section id="motores" title="Motores DC 37mm (W1 – W6)" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                }>
                  <div className="grid md:grid-cols-2 gap-4">
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Especificaciones</p>
                      <table className="w-full">
                        <tbody>
                          <SpecRow label="Tipo" val="DC con caja reductora" />
                          <SpecRow label="Diámetro" val="37 mm" />
                          <SpecRow label="Tensión" val="12 V nominal" />
                          <SpecRow label="RPM (libre)" val="~150 RPM (con reducción)" />
                          <SpecRow label="Unidades" val="6 (W1 – W6)" />
                          <SpecRow label="Distribución" val="3 izquierda · 3 derecha" />
                        </tbody>
                      </table>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Lógica de control (PWM 200 Hz)</p>
                      <div className="space-y-2.5 text-xs">
                        {[
                          { modo: "Avance", desc: "Lado izq. y dcho. giran hacia adelante al mismo PWM" },
                          { modo: "Retroceso", desc: "Ambos lados invierten dirección" },
                          { modo: "Giro Ackermann", desc: "Diferencia de velocidad entre lados, servos activos" },
                          { modo: "Giro en sitio", desc: "Lado izq. y dcho. en sentidos opuestos (sin servos)" },
                          { modo: "Kickstart", desc: "Burst 255 PWM × 80 ms al arrancar desde parado" },
                        ].map(m => (
                          <div key={m.modo} className="flex gap-3">
                            <span className="text-orange-400 font-mono font-bold w-28 shrink-0">{m.modo}</span>
                            <span className="text-slate-400">{m.desc}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </Section>

                {/* Drivers */}
                <Section id="drivers" title="Drivers DRV8871H (×3)" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                } color="text-amber-400" bg="bg-amber-500/10">
                  <div className="grid md:grid-cols-2 gap-4">
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Especificaciones DRV8871H</p>
                      <table className="w-full">
                        <tbody>
                          <SpecRow label="Topología" val="H-Bridge integrado" />
                          <SpecRow label="Corriente pico" val="3.6 A" />
                          <SpecRow label="Tensión VM" val="6.5 – 45 V" />
                          <SpecRow label="Control" val="2 pines PWM (IN1 / IN2)" />
                          <SpecRow label="Protección" val="Sobre-corriente · Temperatura" />
                          <SpecRow label="Unidades" val="3 (2 motores por driver)" />
                        </tbody>
                      </table>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Asignación de canales</p>
                      <div className="space-y-2 text-xs font-mono">
                        {[
                          { ref: "DRV1", motors: "W1 (FL) · W2 (ML)" },
                          { ref: "DRV2", motors: "W3 (RL) · W4 (FR)" },
                          { ref: "DRV3", motors: "W5 (MR) · W6 (RR)" },
                        ].map(d => (
                          <div key={d.ref} className="flex items-center gap-3 bg-slate-800/30 rounded px-3 py-2">
                            <span className="text-amber-400 font-bold w-12">{d.ref}</span>
                            <span className="text-slate-400">{d.motors}</span>
                          </div>
                        ))}
                        <p className="text-[10px] text-slate-600 pt-1">FL=Front Left · ML=Mid Left · RL=Rear Left · FR=Front Right · MR=Mid Right · RR=Rear Right</p>
                      </div>
                    </div>
                  </div>
                </Section>

                {/* Dirección Ackermann */}
                <Section id="ackermann" title="Dirección Ackermann (×4 servos)" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6l9-3 9 3M3 18l9 3 9-3"/></svg>
                } color="text-orange-400" bg="bg-orange-500/10">
                  <div className="grid md:grid-cols-2 gap-4 mb-4">
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Especificaciones servo</p>
                      <table className="w-full">
                        <tbody>
                          <SpecRow label="Tipo" val="Servo digital (20 kg·cm)" />
                          <SpecRow label="Librería" val="ServoEasing" />
                          <SpecRow label="Control" val="PWM directo desde ESP32" />
                          <SpecRow label="Posiciones" val="Recto · Giro máx. izq. · Giro máx. dcho." />
                          <SpecRow label="Unidades" val="4 (esquinas: FL, FR, RL, RR)" />
                        </tbody>
                      </table>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Principio Ackermann</p>
                      <p className="text-xs text-slate-400 leading-relaxed mb-3">
                        En una curva, la rueda interior describe un arco de menor radio que la exterior. La geometría Ackermann hace que los ángulos de los 4 servos sean diferentes entre sí para que todas las ruedas giren alrededor del mismo punto instantáneo de giro.
                      </p>
                      <div className="text-xs font-mono bg-slate-800/50 rounded px-3 py-2 text-slate-300">
                        θ_interior {">"} θ_exterior<br/>
                        <span className="text-slate-500">// reduce desgaste y deslizamiento</span>
                      </div>
                    </div>
                  </div>
                  <div className="overflow-x-auto rounded border border-slate-800">
                    <table className="w-full text-left">
                      <thead>
                        <tr className="bg-slate-900 border-b border-slate-700">
                          <th className="py-2.5 px-3 text-[10px] font-bold text-slate-400 uppercase tracking-wider">GPIO</th>
                          <th className="py-2.5 px-3 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Señal</th>
                          <th className="py-2.5 px-3 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Servo</th>
                        </tr>
                      </thead>
                      <tbody className="bg-slate-950">
                        <PinRow pin="GPIO 13" signal="PWM Servo" desc="Steering Front-Left (W1)" color="text-orange-400" />
                        <PinRow pin="GPIO 21" signal="PWM Servo" desc="Steering Front-Right (W4)" color="text-orange-400" />
                        <PinRow pin="GPIO 12" signal="PWM Servo" desc="Steering Rear-Left (W3)" color="text-orange-400" />
                        <PinRow pin="GPIO 19" signal="PWM Servo" desc="Steering Rear-Right (W6)" color="text-orange-400" />
                        <PinRow pin="GPIO 15" signal="PWM Servo" desc="Camera tilt (pitch)" color="text-orange-400" />
                      </tbody>
                    </table>
                  </div>
                </Section>

                {/* Gimbal - NEMA 17 */}
                <Section id="gimbal" title="Gimbal — NEMA 17 + TMC2209" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                } color="text-orange-400" bg="bg-orange-500/10">
                  <div className="grid md:grid-cols-2 gap-4">
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">NEMA 17 (eje pan)</p>
                      <table className="w-full">
                        <tbody>
                          <SpecRow label="Tipo" val="Stepper bipolar" />
                          <SpecRow label="Paso" val="1.8° / paso (200 pasos/rev)" />
                          <SpecRow label="Librería" val="AccelStepper" />
                          <SpecRow label="Eje" val="Yaw — rotación horizontal" />
                          <SpecRow label="Control MQTT" val="rover/gimbal/yaw" />
                        </tbody>
                      </table>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">TMC2209 (driver stepper)</p>
                      <table className="w-full">
                        <tbody>
                          <SpecRow label="Modo" val="UART (stealthChop)" />
                          <SpecRow label="Micro-stepping" val="256 (interpolado)" />
                          <SpecRow label="Corriente" val="~800 mA RMS" />
                          <SpecRow label="Ventaja" val="Silencioso · Sin resonancias" />
                          <SpecRow label="Pines STEP/DIR" val="GPIO 23 / GPIO 22" />
                        </tbody>
                      </table>
                    </div>
                  </div>
                </Section>

              </div>
            </div>

            <footer className="border-t border-slate-800 px-4 py-5 flex flex-col sm:flex-row items-center justify-between gap-2 font-mono text-xs text-slate-600 tracking-wider"><span>ROVER <span className="text-orange-500/60">PERSEVERANCE</span> · PROYECTO INTERMODULAR 2025/26</span><span>IES CARDENAL CISNEROS · 2DO SMR</span></footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
