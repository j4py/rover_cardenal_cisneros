<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Alimentación | Rover Perseverance</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css" />
    <script type="text/babel" src="../components/NavBar.js?v=2.2"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 font-sans min-h-screen selection:bg-orange-500/30">
    <div id="root"></div>

    <script type="text/babel">
      function Section({ id, title, icon, color = "text-orange-400", bg = "bg-orange-500/10", children }) {
        return (
          <section id={id} className="scroll-mt-20">
            <h2 className="text-2xl font-bold text-white mb-5 flex items-center gap-3">
              <span className={`${bg} ${color} p-2 rounded`}>{icon}</span>
              {title}
            </h2>
            {children}
          </section>
        );
      }

      function SpecRow({ label, val }) {
        return (
          <tr className="border-b border-slate-800/60">
            <td className="py-2 pr-4 text-slate-500 text-sm font-medium w-36">{label}</td>
            <td className="py-2 text-slate-300 text-sm font-mono">{val}</td>
          </tr>
        );
      }

      function App() {
        return (
          <div className="flex flex-col min-h-screen">
            <NavBar basePath="../" />

            <div className="max-w-4xl mx-auto px-4 py-10 w-full flex-1">
              <header className="mb-10 border-b border-slate-800 pb-8">
                <div className="flex items-center gap-3 mb-3">
                  <span className="text-[11px] font-bold text-orange-400 uppercase tracking-widest bg-orange-500/10 border border-orange-500/20 rounded-sm px-3 py-1">Hardware · Alimentación</span>
                  <span className="text-[11px] text-slate-500">Oliver Mignemi Martos</span>
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-white mb-3 tracking-tight">
                  Sistema de <span className="text-orange-400">Alimentación</span>
                </h1>
                <p className="text-lg text-slate-400 max-w-2xl">
                  Distribución de energía desde la batería LiPo 3S hasta cada subsistema del rover.
                </p>

                <div className="grid grid-cols-3 gap-3 mt-6">
                  {[
                    { label: "Tensión entrada", val: "11.1 V", sub: "LiPo 3S" },
                    { label: "Buck converters", val: "×3", sub: "XL4015 ×2 · MP1584 ×1" },
                    { label: "Buses de salida", val: "3", sub: "11V · 6V · 5V" },
                  ].map(s => (
                    <div key={s.label} className="bg-slate-900/50 border border-slate-800 rounded px-3 py-2.5 text-center">
                      <p className="text-[10px] text-slate-500 uppercase tracking-wider font-mono mb-1">{s.label}</p>
                      <p className="text-xl font-black text-orange-400 font-mono">{s.val}</p>
                      <p className="text-[10px] text-slate-600 mt-0.5">{s.sub}</p>
                    </div>
                  ))}
                </div>
              </header>

              <div className="space-y-14">

                {/* Topología */}
                <Section id="topologia" title="Topología de distribución" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                }>
                  <div className="bg-slate-900 border border-slate-800 rounded p-5">
                    <div className="space-y-3 font-mono text-sm">

                      {/* LiPo */}
                      <div className="flex items-center gap-3">
                        <div className="w-32 shrink-0 bg-amber-500/10 border border-amber-500/30 rounded px-3 py-2 text-center">
                          <p className="text-amber-400 font-black text-xs">LIPO 3S</p>
                          <p className="text-amber-300 text-lg font-black">11.1V</p>
                        </div>
                        <div className="flex-1 border-t-2 border-dashed border-slate-700" />
                        <div className="flex flex-col gap-1.5 text-xs text-right">
                          <span className="text-orange-400">→ Motores DC 37mm (×6) directos</span>
                          <span className="text-orange-400">→ Stepper NEMA 17 directo</span>
                          <span className="text-slate-500">→ XL4015 ×2 (entrada)</span>
                          <span className="text-slate-500">→ MP1584 ×1 (entrada)</span>
                        </div>
                      </div>

                      <div className="ml-8 border-l-2 border-slate-800 pl-4 space-y-3 text-xs">

                        {/* XL4015 → Servos */}
                        <div className="flex items-start gap-3">
                          <div className="w-28 shrink-0 bg-orange-500/10 border border-orange-500/30 rounded px-2.5 py-1.5 text-center">
                            <p className="text-orange-400 font-bold text-[10px]">XL4015 ×2</p>
                            <p className="text-orange-300 text-base font-black">5 – 6V</p>
                          </div>
                          <div className="pt-1 text-slate-400 leading-relaxed">
                            <span className="text-orange-300">→ Servos de dirección</span> (FL · FR · RL · RR)<br/>
                            <span className="text-orange-300">→ Servo tilt</span> (cámara)<br/>
                            <span className="text-slate-600">Carga dividida entre los 2 módulos para no saturar un solo buck</span>
                          </div>
                        </div>

                        {/* MP1584 → ESP32 → 3.3V */}
                        <div className="flex items-start gap-3">
                          <div className="w-28 shrink-0 bg-amber-500/10 border border-amber-500/30 rounded px-2.5 py-1.5 text-center">
                            <p className="text-amber-400 font-bold text-[10px]">MP1584 ×1</p>
                            <p className="text-amber-300 text-base font-black">5V</p>
                          </div>
                          <div className="pt-1 text-slate-400 leading-relaxed">
                            <span className="text-amber-300">→ ESP32 (pin VIN)</span><br/>
                            <span className="text-slate-500 ml-3">↳ LDO interno ESP32</span>
                            <span className="text-amber-400"> → 3.3V → TMC2209</span>
                          </div>
                        </div>

                      </div>

                      {/* GND */}
                      <div className="flex items-center gap-3 pt-1">
                        <div className="w-32 shrink-0 bg-slate-800/50 border border-slate-700 rounded px-3 py-1.5 text-center">
                          <p className="text-slate-400 font-black text-xs">GND BUS</p>
                          <p className="text-slate-300 text-base font-black">Común</p>
                        </div>
                        <span className="text-xs text-slate-500">Todos los componentes comparten el mismo plano de tierra</span>
                      </div>

                    </div>
                  </div>
                </Section>

                {/* LiPo */}
                <Section id="bateria" title="Batería LiPo 3S" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="18" height="11" rx="2"/><path d="M22 11v3"/></svg>
                } color="text-amber-400" bg="bg-amber-500/10">
                  <div className="grid md:grid-cols-2 gap-4">
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Especificaciones</p>
                      <table className="w-full">
                        <tbody>
                          <SpecRow label="Configuración" val="3S (3 celdas en serie)" />
                          <SpecRow label="Tensión nominal" val="11.1 V" />
                          <SpecRow label="Tensión cargada" val="12.6 V" />
                          <SpecRow label="Tensión mínima" val="9.9 V (3.3V/celda)" />
                          <SpecRow label="Capacidad" val="2200 – 5000 mAh" />
                          <SpecRow label="Conector" val="XT60 + balanceo JST-XH" />
                        </tbody>
                      </table>
                    </div>
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Monitor de batería (firmware)</p>
                      <p className="text-xs text-slate-400 leading-relaxed mb-3">
                        El ESP32 principal lee el voltaje de la batería cada segundo mediante un divisor resistivo en el pin ADC D34.
                      </p>
                      <table className="w-full text-xs">
                        <tbody>
                          <SpecRow label="Pin ADC" val="GPIO 34 (D34)" />
                          <SpecRow label="R1 / R2" val="10 kΩ / 3.3 kΩ" />
                          <SpecRow label="Factor escala" val="× (R1+R2)/R2 = ×4.03" />
                          <SpecRow label="Filtro" val="EMA (media móvil exp.)" />
                          <SpecRow label="Publicación" val="rover/telemetry cada 1s" />
                        </tbody>
                      </table>
                    </div>
                  </div>
                </Section>

                {/* Buck converters */}
                <Section id="buck" title="Convertidores Buck (Step-Down)" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                } color="text-amber-400" bg="bg-amber-500/10">
                  <div className="grid md:grid-cols-2 gap-4">
                    {[
                      {
                        name: "XL4015 Buck Converter",
                        tag: "×2 — Servos",
                        tagColor: "text-orange-300 bg-orange-500/10 border-orange-500/30",
                        specs: [
                          ["Corriente máx.", "5 A"],
                          ["Entrada", "8 – 36 V"],
                          ["Salida ajustada", "5 – 6 V"],
                          ["Cargas", "Servos ×2 – ×3 por módulo"],
                          ["Regulación", "Potenciómetro multivuelta"],
                        ],
                        note: "La carga de los 5 servos se divide entre los 2 módulos para evitar la saturación térmica de un solo XL4015.",
                      },
                      {
                        name: "MP1584 Buck Converter",
                        tag: "×1 — Lógica",
                        tagColor: "text-amber-300 bg-amber-500/10 border-amber-500/30",
                        specs: [
                          ["Corriente máx.", "3 A"],
                          ["Entrada", "4.5 – 28 V"],
                          ["Salida ajustada", "5 V"],
                          ["Cargas", "ESP32 (pin VIN)"],
                          ["Eficiencia", "~92% típica"],
                        ],
                        note: "El ESP32 recibe 5V por VIN y su regulador LDO interno genera los 3.3V que necesita el TMC2209 y la lógica I2C.",
                      },
                    ].map(b => (
                      <div key={b.name} className="bg-slate-900 border border-slate-800 rounded p-5 hover:border-amber-500/20 transition-colors">
                        <div className="flex items-start justify-between mb-4">
                          <h3 className="text-white font-bold text-sm">{b.name}</h3>
                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded border ${b.tagColor}`}>{b.tag}</span>
                        </div>
                        <table className="w-full text-xs mb-3">
                          <tbody>
                            {b.specs.map(([k, v]) => (
                              <tr key={k} className="border-b border-slate-800/60">
                                <td className="py-1.5 pr-3 text-slate-500 font-medium w-28">{k}</td>
                                <td className="py-1.5 text-slate-300 font-mono">{v}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        <p className="text-[11px] text-slate-500 leading-relaxed border-l-2 border-slate-700 pl-2 italic">{b.note}</p>
                      </div>
                    ))}
                  </div>
                </Section>

              </div>
            </div>

            <footer className="border-t border-slate-800 px-4 py-5 flex flex-col sm:flex-row items-center justify-between gap-2 font-mono text-xs text-slate-600 tracking-wider"><span>ROVER <span className="text-orange-500/60">PERSEVERANCE</span> · PROYECTO INTERMODULAR 2025/26</span><span>IES CARDENAL CISNEROS · 2DO SMR</span></footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
