<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rover - Conexiones</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    
    <!-- Dependencies -->
    <script type="text/babel" src="../components/NavBar.js?v=2.2"></script>
    <script src="../script.js?v=1.4"></script>
</head>

<body class="bg-slate-950 text-slate-200 font-['Outfit'] min-h-screen flex flex-col bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
    <div id="root" class="flex-1 flex flex-col h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const NavBar = window.NavBar;

        // Helpers para parseo y emparejamiento preciso de tokens en las conexiones
        const getCleanTokens = (str) => {
            if (!str) return [];
            return str.toUpperCase()
                .split(/[\/\(\)\s,\#\-\[\]\(\)]+/)
                .map(t => t.trim())
                .filter(Boolean);
        };

        const cleanToken = (token) => {
            if (!token) return "";
            return token.toUpperCase().replace(/^D/, '').replace(/^GPIO/, '');
        };

        const matchTokens = (pinLabel, connectionTokens) => {
            const cleanPin = cleanToken(pinLabel);
            return connectionTokens.some(tok => {
                const cleanTok = cleanToken(tok);
                if (cleanPin === cleanTok) return true;
                if (cleanPin === 'VIN' && cleanTok.startsWith('VIN')) return true;
                if (cleanPin === '3V3' && cleanTok.startsWith('3V3')) return true;
                if (cleanPin === 'G' && cleanTok === 'GND') return true;
                if (cleanPin === 'GND' && cleanTok === 'GND') return true;
                if (cleanPin === 'TX' && cleanTok.startsWith('TX')) return true;
                if (cleanPin === 'RX' && cleanTok.startsWith('RX')) return true;
                return false;
            });
        };

        // Dataset de pines físicos del ESP32 de 38 pines (19 en cada lateral)
        const PIN_LAYOUT = [
            // Lado Izquierdo (3V3 a VIN, de arriba a abajo)
            { id: "3V3", label: "3V3", side: "left", x: 19.5, y: 6.0, type: "power" },
            { id: "EN", label: "EN", side: "left", x: 19.5, y: 11.0, type: "unused" },
            { id: "VP", label: "VP", side: "left", x: 19.5, y: 16.0, type: "unused" },
            { id: "VN", label: "VN", side: "left", x: 19.5, y: 21.0, type: "unused" },
            { id: "D34", label: "34", side: "left", x: 19.5, y: 26.0, type: "sensor" },
            { id: "D35", label: "35", side: "left", x: 19.5, y: 31.0, type: "unused" },
            { id: "D32", label: "32", side: "left", x: 19.5, y: 36.0, type: "motor" },
            { id: "D33", label: "33", side: "left", x: 19.5, y: 41.0, type: "motor" },
            { id: "D25", label: "25", side: "left", x: 19.5, y: 46.0, type: "motor" },
            { id: "D26", label: "26", side: "left", x: 19.5, y: 51.0, type: "motor" },
            { id: "D27", label: "27", side: "left", x: 19.5, y: 56.0, type: "motor" },
            { id: "D14", label: "14", side: "left", x: 19.5, y: 61.0, type: "motor" },
            { id: "D12", label: "12", side: "left", x: 19.5, y: 66.0, type: "signal" },
            { id: "GND_L", label: "G", side: "left", x: 19.5, y: 71.0, type: "ground" },
            { id: "D13", label: "13", side: "left", x: 19.5, y: 76.0, type: "signal" },
            { id: "D2_F", label: "D2", side: "left", x: 19.5, y: 81.0, type: "unused" },
            { id: "D3_F", label: "D3", side: "left", x: 19.5, y: 86.0, type: "unused" },
            { id: "CMD", label: "CMD", side: "left", x: 19.5, y: 91.0, type: "unused" },
            { id: "VIN", label: "VIN", side: "left", x: 19.5, y: 96.0, type: "power" },

            // Lado Derecho (GND a CLK, de arriba a abajo)
            { id: "GND_R1", label: "G", side: "right", x: 80.5, y: 6.0, type: "ground" },
            { id: "D23", label: "23", side: "right", x: 80.5, y: 11.0, type: "signal" },
            { id: "D22", label: "22", side: "right", x: 80.5, y: 16.0, type: "signal" },
            { id: "TX0", label: "TX", side: "right", x: 80.5, y: 21.0, type: "logic" },
            { id: "RX0", label: "RX", side: "right", x: 80.5, y: 26.0, type: "logic" },
            { id: "D21", label: "21", side: "right", x: 80.5, y: 31.0, type: "signal" },
            { id: "GND_R2", label: "G", side: "right", x: 80.5, y: 36.0, type: "ground" },
            { id: "D19", label: "19", side: "right", x: 80.5, y: 41.0, type: "signal" },
            { id: "D18", label: "18", side: "right", x: 80.5, y: 46.0, type: "motor" },
            { id: "D5", label: "5", side: "right", x: 80.5, y: 51.0, type: "motor" },
            { id: "D17", label: "17", side: "right", x: 80.5, y: 56.0, type: "motor" },
            { id: "D16", label: "16", side: "right", x: 80.5, y: 61.0, type: "motor" },
            { id: "D4", label: "4", side: "right", x: 80.5, y: 66.0, type: "motor" },
            { id: "D0_B", label: "0", side: "right", x: 80.5, y: 71.0, type: "unused" },
            { id: "D2", label: "2", side: "right", x: 80.5, y: 76.0, type: "motor" },
            { id: "D15", label: "15", side: "right", x: 80.5, y: 81.0, type: "signal" },
            { id: "D1_F", label: "D1", side: "right", x: 80.5, y: 86.0, type: "unused" },
            { id: "D0_F", label: "D0", side: "right", x: 80.5, y: 91.0, type: "unused" },
            { id: "CLK", label: "CLK", side: "right", x: 80.5, y: 96.0, type: "unused" }
        ];

        // Función de búsqueda flexible y robusta para mapear etiquetas a pines físicos del Rover
        const findConnectionForPin = (pin, wiringData) => {
            if (!pin || !wiringData || !wiringData.robot) return null;
            
            // Soporte si se pasa un string en lugar de objeto pin
            let label = typeof pin === 'string' ? pin : pin.label;
            let id = typeof pin === 'object' ? pin.id : "";
            
            // Si es un pin de Flash, no tiene conexiones externas en el robot
            if (id && (id.endsWith('_F') || id === 'CMD' || id === 'CLK' || id === 'SD2' || id === 'SD3')) {
                return null;
            }
            if (label === 'D2' && id === 'D2_F') {
                return null; // Left-side D2 is flash
            }
            if (label === 'D3' && id === 'D3_F') {
                return null; // Left-side D3 is flash
            }

            const search = label.toUpperCase().trim();
            
            return wiringData.robot.find(item => {
                const itemPin = item.pin.toUpperCase();
                const parts = itemPin.split(/[\/\(\)\s,]+/).map(p => p.trim());
                
                return parts.some(part => {
                    const cleanPart = part.replace(/^D/, '').replace(/^GPIO/, '');
                    const cleanSearch = search.replace(/^D/, '').replace(/^GPIO/, '');
                    
                    if (cleanSearch === cleanPart) return true;
                    
                    if (cleanSearch === 'VIN' && cleanPart.startsWith('VIN')) return true;
                    if (cleanSearch === '3V3' && cleanPart.startsWith('3V3')) return true;
                    if (cleanSearch === 'G' && cleanPart === 'GND') return true;
                    if (cleanSearch === 'GND' && cleanPart === 'GND') return true;
                    if (cleanSearch === 'TX' && cleanPart.startsWith('TX')) return true;
                    if (cleanSearch === 'RX' && cleanPart.startsWith('RX')) return true;
                    
                    return false;
                });
            });
        };

        // Dataset de pines del driver paso a paso TMC2209
        const TMC_PIN_LAYOUT = [
            // Lado Izquierdo (Potencia y Motor, 30 al 23 de arriba a abajo)
            { id: "TMC_GND_30", label: "GND", pinNumber: 30, side: "left", type: "ground" },
            { id: "TMC_VDD", label: "VDD", pinNumber: 29, side: "left", type: "power" },
            { id: "TMC_B2", label: "B2", pinNumber: 28, side: "left", type: "motor" },
            { id: "TMC_B1", label: "B1", pinNumber: 27, side: "left", type: "motor" },
            { id: "TMC_A1", label: "A1", pinNumber: 26, side: "left", type: "motor" },
            { id: "TMC_A2", label: "A2", pinNumber: 25, side: "left", type: "motor" },
            { id: "TMC_GND_24", label: "GND", pinNumber: 24, side: "left", type: "ground" },
            { id: "TMC_VM", label: "VM", pinNumber: 23, side: "left", type: "power" },

            // Lado Derecho (Control, 30 al 23 de arriba a abajo)
            { id: "TMC_DIR", label: "DIR", pinNumber: 30, side: "right", type: "signal" },
            { id: "TMC_STEP", label: "STEP", pinNumber: 29, side: "right", type: "signal" },
            { id: "TMC_MS3", label: "SPREAD", pinNumber: 28, side: "right", type: "unused" },
            { id: "TMC_PDN_27", label: "PDN", pinNumber: 27, side: "right", type: "unused" },
            { id: "TMC_PDN_26", label: "PDN", pinNumber: 26, side: "right", type: "unused" },
            { id: "TMC_MS2", label: "MS2", pinNumber: 25, side: "right", type: "power" },
            { id: "TMC_MS1", label: "MS1", pinNumber: 24, side: "right", type: "power" },
            { id: "TMC_EN", label: "EN", pinNumber: 23, side: "right", type: "signal" }
        ];

        // Función de búsqueda flexible para mapear pines del TMC2209 a sus conexiones reales
        const findConnectionForTmcPin = (pin, wiringData) => {
            if (!pin || !wiringData) return null;
            let label = pin.label;
            let pinNumber = pin.pinNumber;
            
            // Lado de Control
            if (label === 'STEP') {
                return { pin: "TMC2209 STEP", dest: "Conectado al pin D23 del ESP32 para recibir pulsos de paso." };
            }
            if (label === 'DIR') {
                return { pin: "TMC2209 DIR", dest: "Conectado al pin D22 del ESP32 para recibir la dirección de giro." };
            }
            if (label === 'EN') {
                return { pin: "TMC2209 EN", dest: "Habilitación. Conectado permanentemente a GND (activo) para habilitación por hardware." };
            }
            if (label === 'PDN') {
                return null;
            }
            if (label === 'MS1' || label === 'MS2') {
                return { pin: `TMC2209 ${label}`, dest: "Configuración microstepping. Conectado directamente a la línea de 3.3V (VDD) mediante Jumper físico." };
            }
            if (label === 'SPREAD') {
                return { pin: "TMC2209 SPREAD", dest: "Configuración modo silencioso/torque en modo standalone (NC = StealthChop)." };
            }

            // Lado de Potencia y Motor
            if (label === 'VM') {
                return { pin: "TMC2209 VMOT", dest: "Alimentación de potencia (11.1V directos de LiPo 3S) + Cap 100µF local." };
            }
            if (label === 'GND') {
                return { pin: "GND", dest: "Masa digital / potencia conectada al punto estrella del Rover." };
            }
            if (label === 'A2' || label === 'A1' || label === 'B1' || label === 'B2') {
                return { pin: "TMC2209 OUT A/B", dest: `Salida de la bobina hacia el motor NEMA 17 (Pin ${pinNumber} - ${label}).` };
            }
            if (label === 'VDD') {
                return { pin: "TMC2209 VDD", dest: "Alimentación lógica de 3.3V provista desde el pin 3V3 del ESP32." };
            }
            
            return null;
        };

        // Notas técnicas de ingeniería para cada pin del TMC2209
        const getTmcPinTechnicalNote = (pin) => {
            if (!pin) return "Selecciona o pasa el cursor sobre cualquier pin físico del driver TMC2209 para ver las directrices técnicas.";
            const label = pin.label;
            const id = pin.id;
            const pinNumber = pin.pinNumber;

            if (id === "TMC_EN") {
                return "Pin Enable (EN). Activo a nivel lógico bajo (GND). Si está al aire o a 3.3V, el driver se apaga y el motor gira libremente. En este proyecto se conecta a GND para mantenerlo habilitado permanentemente.";
            }
            if (id === "TMC_MS1" || id === "TMC_MS2") {
                return "Pines de configuración de microstepping. En este Rover, se conectan directamente a la línea de 3.3V (VDD) mediante un jumper de plástico para fijar la resolución a 16 micropasos (con interpolación a 256).";
            }
            if (id === "TMC_PDN_26" || id === "TMC_PDN_27") {
                return "Puerto UART (PDN). No se utiliza en este proyecto (el driver trabaja en Standalone). Queda libre y desconectado.";
            }
            if (id === "TMC_MS3") {
                return "Pin de selección SpreadCycle / StealthChop (SPREAD). Al aire activa el modo ultra-silencioso StealthChop. Conectado a VCC (3.3V) activa el modo SpreadCycle para mayor fuerza.";
            }
            if (id === "TMC_STEP") {
                return "Entrada STEP. Recibe los pulsos de paso desde el ESP32 (pin D23). Cada pulso avanza el motor un micropaso. Controla la velocidad de giro.";
            }
            if (id === "TMC_DIR") {
                return "Entrada DIR. Recibe el nivel de dirección desde el ESP32 (pin D22). Define el sentido de giro del eje (horario / antihorario).";
            }
            if (id === "TMC_VM") {
                return "Alimentación de motor (VMOT). Debe ir conectada directamente al positivo de la batería LiPo 3S (11.1V). Es obligatorio soldar un capacitor de 100µF en paralelo cerca de este pin.";
            }
            if (id === "TMC_GND_24") {
                return "Masa de potencia (GND). Retorno de la corriente del motor. Debe ir conectada al punto central estrella (Star-Grounding) con un cable grueso independiente para evitar ruidos.";
            }
            if (id === "TMC_A2" || id === "TMC_A1" || id === "TMC_B1" || id === "TMC_B2") {
                return `Salida para la bobina del motor paso a paso NEMA 17. Las salidas A1/A2 pertenecen a la fase A; B1/B2 a la fase B. Invertir una pareja de cables cambia la dirección física del motor.`;
            }
            if (id === "TMC_VDD") {
                return "Alimentación lógica (VDD). Requiere 3.3V o 5V estables. Se conecta a la salida de 3.3V (pin 3V3) del ESP32.";
            }
            if (id === "TMC_GND_30") {
                return "Masa digital lógica (GND). Punto de referencia de retorno para las señales lógicas de control del ESP32.";
            }
            return "";
        };

        // Diagnóstico y compatibilidad de hardware para el TMC2209
        const getTmcPinAvailability = (pin, isUsed) => {
            if (!pin) return null;
            
            const label = pin.label;
            const id = pin.id;
            const pinNumber = pin.pinNumber;
            
            let hardwareStatus = "Pin de Control";
            let hardwareBadgeColor = "bg-blue-500/10 text-blue-300 border-blue-500/30";
            let hardwareReason = "Pin de entrada lógica para el control del driver.";
            let canOutputPWM = false;
            let canInput = true;
            let isUsableGpio = false;
            let type = "standard";

            if (id === "TMC_VM") {
                type = "power";
                hardwareStatus = "Potencia Motor (VM)";
                hardwareBadgeColor = "bg-red-500/15 text-red-300 border border-red-500/30 font-bold";
                hardwareReason = "Entrada de alimentación para la etapa de potencia del motor (VMOT). Soporta desde 5.5V hasta 36V. Debe conectarse a LiPo 3S con capacitor de desacoplo.";
            } else if (id === "TMC_VDD") {
                type = "power";
                hardwareStatus = "Alimentación Lógica (VDD)";
                hardwareBadgeColor = "bg-red-500/10 text-red-400 border border-red-500/30";
                hardwareReason = "Entrada de alimentación para el circuito lógico interno del driver. En este proyecto se alimenta a 3.3V desde el ESP32.";
            } else if (id === "TMC_GND_24" || id === "TMC_GND_30") {
                type = "ground";
                hardwareStatus = "Masa / GND";
                hardwareBadgeColor = "bg-slate-500/10 text-slate-400 border border-slate-500/30";
                hardwareReason = "Retorno de corriente. Pin 24 es GND de potencia (retorno motor) y Pin 30 es GND digital de lógica. Ambos deben estar enlazados al GND común del Rover.";
            } else if (id === "TMC_A2" || id === "TMC_A1" || id === "TMC_B1" || id === "TMC_B2") {
                type = "motor";
                hardwareStatus = "Salida Motor";
                hardwareBadgeColor = "bg-amber-500/10 text-amber-300 border-amber-500/30";
                hardwareReason = "Salida de corriente puente-H hacia las bobinas del motor paso a paso NEMA 17.";
            } else if (id === "TMC_EN") {
                type = "control";
                hardwareStatus = "Habilitación (EN)";
                hardwareBadgeColor = "bg-orange-500/15 text-orange-300 border border-orange-500/30";
                hardwareReason = "Entrada de habilitación del driver. Activo en BAJO (GND). Si está en ALTO (3V3), apaga las salidas.";
            } else if (id === "TMC_MS1" || id === "TMC_MS2") {
                type = "power";
                hardwareStatus = "Alimentación Microstepping (3.3V)";
                hardwareBadgeColor = "bg-red-500/10 text-red-400 border border-red-500/30";
                hardwareReason = "Pines de configuración de microstepping. Conectados a la línea lógica de 3.3V (VDD) mediante jumpers de plástico para fijar el modo de 16 micropasos.";
            } else if (id === "TMC_MS3") {
                type = "config";
                hardwareStatus = "Configuración Standalone (StealthChop)";
                hardwareBadgeColor = "bg-purple-500/15 text-purple-300 border border-purple-500/30";
                hardwareReason = "Pin SPREAD. Al aire (NC) activa el modo ultra-silencioso StealthChop.";
            } else if (id === "TMC_PDN_26" || id === "TMC_PDN_27") {
                type = "logic";
                hardwareStatus = "Comunicación UART (No Usada)";
                hardwareBadgeColor = "bg-slate-500/10 text-slate-400 border border-slate-500/30";
                hardwareReason = "Puerto UART monohilo para control inteligente. En este proyecto no se conecta y queda libre, operando en modo Standalone.";
            } else if (id === "TMC_STEP" || id === "TMC_DIR") {
                type = "signal";
                hardwareStatus = "Señal de Control";
                hardwareBadgeColor = "bg-blue-500/15 text-blue-300 border-blue-500/30";
                hardwareReason = "Señales de control de paso (STEP) y sentido (DIR) provistas directamente desde los pines GPIO del ESP32.";
            }

            return {
                type,
                hardwareStatus,
                hardwareBadgeColor,
                hardwareReason,
                canOutputPWM,
                canInput,
                isUsableGpio,
                isOccupied: isUsed
            };
        };

        // Notas de diseño electrónico e ingeniería para cada pin del rover
        const getPinTechnicalNote = (pin) => {
            if (!pin) return "Selecciona o pasa el cursor sobre cualquier pin físico para ver las directrices técnicas.";
            const label = pin.label;
            const id = pin.id;
            const type = pin.type;

            if (label === 'EN') {
                return "Línea de Reset (Enable). Conectada al botón de reinicio físico de la placa. No debe conectarse a cargas externas ni a circuitos lógicos activos, ya que provocaría reinicios aleatorios o permanentes del ESP32.";
            }
            if (id.endsWith('_F') || id === 'CMD' || id === 'CLK' || id === 'SD2' || id === 'SD3') {
                return "Línea reservada para el bus de memoria Flash SPI interno. No conectar a ningún periférico bajo ninguna circunstancia, ya que inhabilitará por completo la lectura de firmware al arrancar.";
            }

            if (type === "unused") return `El pin ${pin.label} no se utiliza actualmente en el firmware. Queda disponible para futures expansiones (ej. sensores analógicos o pines de telemetría adicionales).`;
            
            const notes = {
                motor: `Señal de control PWM/Dirección dirigida al driver DRV8871H del motor. Requiere capacitor electrolítico local de 100µF en la entrada de potencia VM del driver y cerámicos 0.1µF en el motor N20 para absorber el ruido EMI inductivo.`,
                power: `Línea de alimentación de energía. VIN suministra +5V regulados estables desde el Step-Down MP1584 para alimentar el microcontrolador. 3V3 provee la tensión de referencia lógica para el driver de cámara TMC2209.`,
                ground: `Punto de masa crítica. Conectar mediante cable de retorno independiente en estrella (Star-Grounding) directo al borne central de masa de la batería para evitar ruido de conmutación de potencia en el chip.`,
                signal: `Salida de control PWM directa (3.3V) para servomotores Ackerman. La potencia de los servos debe alimentarse de forma aislada a 6V (Step-Down XL4015) incorporando capacitores electrolíticos amortiguadores de 1000µF.`,
                sensor: `Línea de lectura ADC analógica. Utiliza un divisor resistivo (10k a V_BAT y 3.3k a GND) para adaptar de manera segura el voltaje máximo de la batería LiPo 3S (12.6V) al rango medible de 0 a 3.3V en el pin D34.`,
                logic: `Líneas de depuración lógica serie (UART). TX0 y RX0 cruzados directos al chip de comunicación USB de la placa para volcado de consola a 115200 baudios en fase de testeo.`
            };
            return notes[type] || "";
        };

        const getPinAvailability = (pin, isUsed) => {
            if (!pin) return null;
            
            const label = pin.label;
            const id = pin.id;
            
            let hardwareStatus = "GPIO Estándar";
            let hardwareBadgeColor = "bg-amber-500/10 text-amber-300 border-amber-500/30";
            let hardwareReason = "Pin GPIO digital de propósito general totalmente libre de restricciones físicas. Soporta entrada, salida y generación de señales PWM por hardware (LEDC) aptas para servos o drivers de motor.";
            let canOutputPWM = true;
            let canInput = true;
            let isUsableGpio = true;
            let type = "standard";

            if (pin.type === "power" || pin.type === "ground") {
                type = "power_gnd";
                hardwareStatus = "Alimentación / Masa";
                hardwareBadgeColor = "bg-red-500/10 text-red-400 border border-red-500/30";
                hardwareReason = "Este pin está reservado para la alimentación eléctrica (3V3/VIN) o la masa común (GND) del ESP32. No posee registros lógicos ni circuito GPIO; no se puede configurar como entrada o salida.";
                canOutputPWM = false;
                canInput = false;
                isUsableGpio = false;
            } else if (label === 'EN') {
                type = "reset";
                hardwareStatus = "Reset / Enable (EN)";
                hardwareBadgeColor = "bg-red-500/10 text-red-400 border border-red-500/30";
                hardwareReason = "Pin de habilitación del chip (CHIP_PU / Reset). Está acoplado físicamente al botón de reinicio de la placa y a un pull-up interno de 10kΩ. Si se conecta a masa (GND), el microcontrolador se reinicia inmediatamente. No es un puerto GPIO y no se puede controlar por software.";
                canOutputPWM = false;
                canInput = false;
                isUsableGpio = false;

        function App() {

            // Auto seleccionar primer pin del ESP32 al pasar el ratón por la lista
            useEffect(() => {
                if (hoveredConnection) {
                    const tokens = getCleanTokens(hoveredConnection);
                    let matchingPin = null;
                    
                    if (matchTokens("3V3", tokens) || tokens.includes("VDD")) {
                        matchingPin = PIN_LAYOUT.find(p => p.label === "3V3");
                    } else if (tokens.includes("23") || tokens.includes("STEP")) {
                        matchingPin = PIN_LAYOUT.find(p => p.label === "23");
                    } else if (tokens.includes("22") || tokens.includes("DIR")) {
                        matchingPin = PIN_LAYOUT.find(p => p.label === "22");
                    } else {
                        matchingPin = PIN_LAYOUT.find(p => matchTokens(p.label, tokens));
                    }
                    
                    if (matchingPin) {
                        setSelectedPin(matchingPin);
                    }
                }
            }, [hoveredConnection]);

                        matchingPin = TMC_PIN_LAYOUT.find(p => p.id === "TMC_VM");

                        matchingPin = TMC_PIN_LAYOUT.find(p => p.id === "TMC_VDD");

                        matchingPin = TMC_PIN_LAYOUT.find(p => p.id === "TMC_DIR");
                    } else if (tokens.includes("EN") || tokens.includes("ENABLE")) {
                        matchingPin = TMC_PIN_LAYOUT.find(p => p.id === "TMC_EN");
                    } else if (tokens.includes("GND")) {
                        matchingPin = TMC_PIN_LAYOUT.find(p => p.id === "TMC_GND_24");
                    } else if (tokens.includes("A2")) {
                        matchingPin = TMC_PIN_LAYOUT.find(p => p.id === "TMC_A2");
