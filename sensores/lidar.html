<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiDAR | Rover Perseverance</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css" />
    <script type="text/babel" src="../components/NavBar.js?v=2.2"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 font-sans min-h-screen selection:bg-orange-500/30">
    <div id="root"></div>

    <script type="text/babel">
      function App() {
        return (
          <div className="flex flex-col min-h-screen">
            <NavBar basePath="../" />

            <div className="max-w-4xl mx-auto px-4 py-10 w-full flex-1">
              <header className="mb-10 border-b border-slate-800 pb-8">
                <div className="flex items-center gap-3 mb-3">
                  <span className="text-[11px] font-bold text-amber-400 uppercase tracking-widest bg-amber-500/10 border border-amber-500/20 rounded-sm px-3 py-1">Sensores · LiDAR</span>
                  <span className="text-[11px] text-slate-500">Juan José Naranjo Lobato</span>
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-white mb-3 tracking-tight">
                  Sensor <span className="text-amber-400">LiDAR</span>
                </h1>
                <p className="text-lg text-slate-400 max-w-2xl">
                  Detección de obstáculos y mapeo de proximidad para navegación semi-autónoma del rover.
                </p>
              </header>

              {/* Status banner */}
              <div className="flex items-start gap-4 p-5 bg-amber-500/5 border border-amber-500/20 rounded mb-10">
                <div className="w-10 h-10 rounded bg-amber-500/10 flex items-center justify-center shrink-0 mt-0.5">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-amber-400">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                  </svg>
                </div>
                <div>
                  <p className="text-amber-300 font-bold text-sm mb-1">Integración en desarrollo</p>
                  <p className="text-slate-400 text-sm leading-relaxed">
                    El módulo LiDAR está en fase de integración hardware. El firmware de detección de obstáculos y la visualización de proximidad en el panel de control están planificados como siguiente iteración del proyecto.
                  </p>
                </div>
              </div>

              <div className="space-y-10">

                {/* Objetivo */}
                <section>
                  <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-3">
                    <span className="bg-amber-500/10 text-amber-400 p-2 rounded">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                    </span>
                    Objetivo del subsistema
                  </h2>
                  <div className="bg-slate-900 border border-slate-800 rounded p-6">
                    <div className="grid md:grid-cols-3 gap-4">
                      {[
                        { icon: "🚧", title: "Detección de obstáculos", desc: "Identificar objetos en la trayectoria antes de la colisión, a distancias de 10 cm a 12 m." },
                        { icon: "🗺️", title: "Mapeo de proximidad", desc: "Generar un perfil radial del entorno inmediato del rover para ayudar al operador." },
                        { icon: "⛔", title: "Parada de emergencia", desc: "Si se detecta obstáculo a menos de N cm, publicar parada de emergencia por MQTT." },
                      ].map(f => (
                        <div key={f.title} className="p-4 bg-slate-800/30 rounded border border-slate-700/50">
                          <p className="text-2xl mb-2">{f.icon}</p>
                          <p className="text-sm font-bold text-slate-200 mb-1">{f.title}</p>
                          <p className="text-xs text-slate-400 leading-relaxed">{f.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </section>

                {/* Hardware previsto */}
                <section>
                  <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-3">
                    <span className="bg-slate-700/50 text-slate-400 p-2 rounded">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg>
                    </span>
                    Hardware previsto
                  </h2>
                  <div className="bg-slate-900 border border-slate-800 rounded overflow-hidden">
                    <table className="w-full text-left">
                      <thead>
                        <tr className="bg-slate-800/50 border-b border-slate-700">
                          <th className="py-2.5 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Componente</th>
                          <th className="py-2.5 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Especificación</th>
                          <th className="py-2.5 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Estado</th>
                        </tr>
                      </thead>
                      <tbody>
                        {[
                          ["Sensor LiDAR", "TF-Luna / TFmini Plus (UART)", "Por confirmar"],
                          ["ESP32 dedicado", "ESP32 DevKit v1 (o integrado en rover)", "Planificado"],
                          ["Rango", "10 cm – 12 m (TF-Luna)", "—"],
                          ["Interfaz", "UART 115200 baud", "—"],
                          ["Frame rate", "100 Hz", "—"],
                        ].map(([comp, spec, st]) => (
                          <tr key={comp} className="border-b border-slate-800 hover:bg-slate-800/20 transition-colors">
                            <td className="py-2.5 px-4 text-sm text-slate-300 font-medium">{comp}</td>
                            <td className="py-2.5 px-4 text-sm text-slate-400 font-mono">{spec}</td>
                            <td className="py-2.5 px-4">
                              <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-amber-500/10 text-amber-300 border border-amber-500/20">{st}</span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </section>

                {/* Integración prevista */}
                <section>
                  <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-3">
                    <span className="bg-slate-700/50 text-slate-400 p-2 rounded">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
                    </span>
                    Integración MQTT planificada
                  </h2>
                  <div className="bg-slate-900 border border-slate-800 rounded p-5">
                    <p className="text-sm text-slate-400 mb-4">Los tópicos tentativos para la integración del LiDAR en el ecosistema MQTT del rover:</p>
                    <div className="space-y-2 font-mono text-xs">
                      {[
                        { dir: "PUB", topic: "rover/lidar/distance", desc: '{"distance_cm": 145, "status": "ok"} — cada 100ms' },
                        { dir: "PUB", topic: "rover/lidar/alert", desc: '{"alert": "obstacle", "distance_cm": 20} — si d < umbral' },
                        { dir: "SUB", topic: "rover/lidar/threshold", desc: '{"min_cm": 30} — umbral de alerta configurable' },
                      ].map(({ dir, topic, desc }) => (
                        <div key={topic} className="flex items-start gap-3 bg-slate-800/30 rounded p-3">
                          <span className={`text-[10px] font-bold px-2 py-0.5 rounded border shrink-0 mt-0.5 ${dir === "PUB" ? "text-orange-300 bg-orange-500/10 border-orange-500/30" : "text-amber-300 bg-amber-500/10 border-amber-500/30"}`}>{dir}</span>
                          <div>
                            <p className="text-orange-300">{topic}</p>
                            <p className="text-slate-500 text-[11px] mt-0.5">{desc}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </section>

              </div>
            </div>

            <footer className="border-t border-slate-800 px-4 py-5 flex flex-col sm:flex-row items-center justify-between gap-2 font-mono text-xs text-slate-600 tracking-wider"><span>ROVER <span className="text-orange-500/60">PERSEVERANCE</span> · PROYECTO INTERMODULAR 2025/26</span><span>IES CARDENAL CISNEROS · 2DO SMR</span></footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
