<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cámara & Vídeo | Rover Perseverance</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css" />
    <script type="text/babel" src="../components/NavBar.js?v=2.2"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 font-sans min-h-screen selection:bg-orange-500/30">
    <div id="root"></div>

    <script type="text/babel">
      function Section({ id, title, icon, color = "text-orange-400", bg = "bg-orange-500/10", children }) {
        return (
          <section id={id} className="scroll-mt-20">
            <h2 className="text-2xl font-bold text-white mb-5 flex items-center gap-3">
              <span className={`${bg} ${color} p-2 rounded`}>{icon}</span>
              {title}
            </h2>
            {children}
          </section>
        );
      }

      function SpecRow({ label, val }) {
        return (
          <tr className="border-b border-slate-800/60">
            <td className="py-2 pr-4 text-slate-500 text-sm font-medium w-36">{label}</td>
            <td className="py-2 text-slate-300 text-sm font-mono">{val}</td>
          </tr>
        );
      }

      function TopicRow({ dir, topic, payload }) {
        const isOut = dir === "PUB";
        return (
          <tr className="border-b border-slate-800 hover:bg-slate-800/30 transition-colors">
            <td className="py-2 px-3">
              <span className={`text-[10px] font-bold px-2 py-0.5 rounded border font-mono ${isOut ? "text-orange-300 bg-orange-500/10 border-orange-500/30" : "text-amber-300 bg-amber-500/10 border-amber-500/30"}`}>{dir}</span>
            </td>
            <td className="py-2 px-3 font-mono text-xs text-orange-300">{topic}</td>
            <td className="py-2 px-3 text-xs text-slate-400 font-mono">{payload}</td>
          </tr>
        );
      }

      function App() {
        return (
          <div className="flex flex-col min-h-screen">
            <NavBar basePath="../" />

            <div className="max-w-4xl mx-auto px-4 py-10 w-full flex-1">
              <header className="mb-10 border-b border-slate-800 pb-8">
                <div className="flex items-center gap-3 mb-3">
                  <span className="text-[11px] font-bold text-orange-400 uppercase tracking-widest bg-orange-500/10 border border-orange-500/20 rounded-sm px-3 py-1">Sensores · Cámara & Vídeo</span>
                  <span className="text-[11px] text-slate-500">Marcelo Alejandro Huayhua Moreno</span>
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-white mb-3 tracking-tight">
                  Cámara <span className="text-orange-400">&</span> Gimbal
                </h1>
                <p className="text-lg text-slate-400 max-w-2xl">
                  Sistema de visión remota con streaming WebSocket a 20 FPS, gimbal motorizado de 2 ejes y control MQTT del encuadre.
                </p>
              </header>

              <div className="space-y-14">

                {/* Hardware */}
                <Section id="hardware" title="Hardware del sistema de vídeo" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 7 16 12 23 17V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                }>
                  <div className="grid md:grid-cols-2 gap-4">
                    <div className="bg-slate-900 border border-slate-800 rounded p-5 hover:border-orange-500/20 transition-colors">
                      <div className="flex items-start justify-between mb-4">
                        <h3 className="text-white font-bold text-sm">Freenove ESP32-S3 WROOM CAM</h3>
                        <span className="text-[10px] font-bold px-2 py-0.5 rounded border text-orange-300 bg-orange-500/10 border-orange-500/30">Microcontrolador</span>
                      </div>
                      <table className="w-full text-xs">
                        <tbody>
                          <SpecRow label="Chip" val="ESP32-S3 dual-core 240 MHz" />
                          <SpecRow label="PSRAM" val="8 MB (OPI PSRAM)" />
                          <SpecRow label="Flash" val="16 MB" />
                          <SpecRow label="WiFi" val="802.11 b/g/n 2.4 GHz" />
                          <SpecRow label="Alimentación" val="5V via USB / VIN" />
                        </tbody>
                      </table>
                    </div>

                    <div className="bg-slate-900 border border-slate-800 rounded p-5 hover:border-orange-500/20 transition-colors">
                      <div className="flex items-start justify-between mb-4">
                        <h3 className="text-white font-bold text-sm">Sensor de imagen OV2640</h3>
                        <span className="text-[10px] font-bold px-2 py-0.5 rounded border text-orange-300 bg-orange-500/10 border-orange-500/30">Cámara</span>
                      </div>
                      <table className="w-full text-xs">
                        <tbody>
                          <SpecRow label="Resolución" val="QVGA 320×240 px" />
                          <SpecRow label="Formato" val="JPEG (quality=30)" />
                          <SpecRow label="Frame rate" val="~20 FPS (WiFi limitado)" />
                          <SpecRow label="Frame buffers" val="3 (PSRAM)" />
                          <SpecRow label="Interfaz" val="DVP 8-bit (paralelo)" />
                        </tbody>
                      </table>
                    </div>

                    <div className="bg-slate-900 border border-slate-800 rounded p-5 hover:border-orange-500/20 transition-colors">
                      <div className="flex items-start justify-between mb-4">
                        <h3 className="text-white font-bold text-sm">NEMA 17 + TMC2209</h3>
                        <span className="text-[10px] font-bold px-2 py-0.5 rounded border text-orange-300 bg-orange-500/10 border-orange-500/30">Gimbal Pan</span>
                      </div>
                      <table className="w-full text-xs">
                        <tbody>
                          <SpecRow label="Motor" val="NEMA 17 Stepper (bipolar)" />
                          <SpecRow label="Driver" val="TMC2209 (UART mode)" />
                          <SpecRow label="Librería" val="AccelStepper" />
                          <SpecRow label="Eje" val="Yaw (rotación horizontal)" />
                          <SpecRow label="Micro-stepping" val="256 (interpolado)" />
                        </tbody>
                      </table>
                    </div>

                    <div className="bg-slate-900 border border-slate-800 rounded p-5 hover:border-amber-500/20 transition-colors">
                      <div className="flex items-start justify-between mb-4">
                        <h3 className="text-white font-bold text-sm">Servo motor (tilt)</h3>
                        <span className="text-[10px] font-bold px-2 py-0.5 rounded border text-amber-300 bg-amber-500/10 border-amber-500/30">Gimbal Tilt</span>
                      </div>
                      <table className="w-full text-xs">
                        <tbody>
                          <SpecRow label="Tipo" val="Servo digital (PWM)" />
                          <SpecRow label="Librería" val="ServoEasing" />
                          <SpecRow label="Eje" val="Pitch (inclinación vertical)" />
                          <SpecRow label="Control" val="MQTT rover/gimbal/pitch" />
                          <SpecRow label="Alimentación" val="5V (bus actuadores)" />
                        </tbody>
                      </table>
                    </div>
                  </div>
                </Section>

                {/* Streaming */}
                <Section id="streaming" title="Pipeline de streaming de vídeo" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                } color="text-amber-400" bg="bg-amber-500/10">
                  <div className="space-y-3">
                    <div className="bg-slate-900 border border-slate-800 rounded p-5">
                      <div className="flex flex-col md:flex-row items-start md:items-center gap-2 text-sm font-mono">
                        {[
                          { label: "ESP32-CAM", sub: "Captura OV2640", color: "bg-orange-500/10 border-orange-500/30 text-orange-300" },
                          { arrow: true },
                          { label: "WebSocket", sub: "Binario JPEG", color: "bg-slate-800 border-slate-700 text-slate-400" },
                          { arrow: true },
                          { label: "video.example.com", sub: "Puerto 9002 /publish", color: "bg-orange-500/10 border-orange-500/30 text-orange-300" },
                          { arrow: true },
                          { label: "Control Panel", sub: "Navegador · <img> tag", color: "bg-amber-500/10 border-amber-500/30 text-amber-300" },
                        ].map((item, i) =>
                          item.arrow ? (
                            <span key={i} className="text-slate-600 text-lg mx-1">→</span>
                          ) : (
                            <div key={i} className={`flex-1 border rounded px-3 py-2 text-center ${item.color}`}>
                              <p className="font-bold text-xs">{item.label}</p>
                              <p className="text-[10px] text-slate-500 mt-0.5">{item.sub}</p>
                            </div>
                          )
                        )}
                      </div>
                    </div>

                    <div className="grid md:grid-cols-2 gap-4">
                      <div className="bg-slate-900/50 border border-slate-800 rounded p-4">
                        <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Configuración de cámara</p>
                        <div className="space-y-2 text-xs font-mono">
                          {[
                            ["pixel_format", "PIXFORMAT_JPEG"],
                            ["frame_size", "FRAMESIZE_QVGA (320×240)"],
                            ["jpeg_quality", "30 (0=mejor, 63=peor)"],
                            ["fb_count", "3 (requiere PSRAM)"],
                            ["grab_mode", "CAMERA_GRAB_LATEST"],
                          ].map(([k, v]) => (
                            <div key={k} className="flex gap-2">
                              <span className="text-orange-400 shrink-0">{k}</span>
                              <span className="text-slate-500">=</span>
                              <span className="text-slate-300">{v}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div className="bg-slate-900/50 border border-slate-800 rounded p-4">
                        <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">Endpoint WebSocket</p>
                        <div className="space-y-2 text-xs font-mono">
                          {[
                            ["Host", "direct.example.com"],
                            ["Puerto", "9002"],
                            ["Path", "/publish"],
                            ["Protocolo", "WS (sin TLS)"],
                            ["Datos", "Binario JPEG raw"],
                          ].map(([k, v]) => (
                            <div key={k} className="flex gap-2">
                              <span className="text-slate-500 w-20 shrink-0">{k}</span>
                              <span className="text-slate-300">{v}</span>
                            </div>
                          ))}
                        </div>
                        <p className="text-[10px] text-slate-600 mt-3 leading-relaxed">Sin TLS para evitar overhead de CPU en el ESP32-S3. El proxy Nginx gestiona la distribución a los clientes web.</p>
                      </div>
                    </div>

                    <div className="bg-slate-900/30 border border-slate-700/40 rounded p-4">
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2">Diagnóstico periódico (cada 5 s)</p>
                      <p className="text-xs text-slate-400 font-mono">Frames sent: <span className="text-amber-400">N</span> · Frames failed: <span className="text-red-400">N</span> · RSSI: <span className="text-orange-400">-XX dBm</span> · Free RAM: <span className="text-amber-400">XXXXXX B</span></p>
                    </div>
                  </div>
                </Section>

                {/* MQTT */}
                <Section id="mqtt" title="Control MQTT del gimbal" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
                } color="text-orange-400" bg="bg-orange-500/10">
                  <p className="text-sm text-slate-400 mb-4 leading-relaxed">
                    El gimbal es controlado desde el <strong className="text-slate-200">firmware principal (Mars_Rover.ino)</strong>. El Centro de Mando envía comandos al rover, que reenvía las posiciones de yaw y pitch vía MQTT. La cámara solo transmite vídeo.
                  </p>
                  <div className="overflow-x-auto rounded border border-slate-800 mb-4">
                    <table className="w-full text-left">
                      <thead>
                        <tr className="bg-slate-900 border-b border-slate-700">
                          <th className="py-2.5 px-3 text-[10px] font-bold text-slate-400 uppercase tracking-wider w-16">Dir.</th>
                          <th className="py-2.5 px-3 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tópico</th>
                          <th className="py-2.5 px-3 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Payload / Formato</th>
                        </tr>
                      </thead>
                      <tbody className="bg-slate-950">
                        <TopicRow dir="SUB" topic="rover/gimbal/yaw" payload='{"pos": 90} — stepper NEMA 17 (pan)' />
                        <TopicRow dir="SUB" topic="rover/gimbal/pitch" payload='{"pos": 45} — servo tilt' />
                        <TopicRow dir="SUB" topic="rover/cmd" payload='{"action":"gimbal_reset"} — posición cero' />
                      </tbody>
                    </table>
                  </div>
                  <div className="grid md:grid-cols-3 gap-3">
                    {[
                      { k: "Broker", v: "direct.example.com:1883" },
                      { k: "Vídeo stream", v: "video.example.com:9002" },
                      { k: "Vídeo viewer", v: "video.example.com (web)" },
                    ].map(({ k, v }) => (
                      <div key={k} className="bg-slate-900/50 border border-slate-800 rounded px-4 py-3">
                        <p className="text-[10px] text-slate-500 uppercase tracking-wider font-mono mb-0.5">{k}</p>
                        <p className="text-sm font-mono text-slate-200">{v}</p>
                      </div>
                    ))}
                  </div>
                </Section>

                {/* WiFi */}
                <Section id="wifi" title="Conectividad WiFi" icon={
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                } color="text-amber-400" bg="bg-amber-500/10">
                  <div className="bg-slate-900 border border-slate-800 rounded p-5">
                    <p className="text-sm text-slate-400 mb-4">Usa <code className="text-slate-200 text-xs bg-slate-800 px-1.5 py-0.5 rounded">WiFiMulti</code> para conectar a la primera red disponible en orden de preferencia:</p>
                    <div className="space-y-2">
                      {[
                        { ssid: "Livebox7-2E71", prio: "Prioridad 1", desc: "Red principal del domicilio" },
                        { ssid: "M3", prio: "Prioridad 2", desc: "Red de respaldo / hotspot móvil" },
                      ].map(n => (
                        <div key={n.ssid} className="flex items-center gap-4 bg-slate-950 rounded px-4 py-3 border border-slate-800/50">
                          <span className="font-mono text-amber-400 font-bold text-sm w-36">{n.ssid}</span>
                          <span className="text-[10px] text-slate-600 uppercase tracking-wider">{n.prio}</span>
                          <span className="text-xs text-slate-500 ml-auto">{n.desc}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </Section>

              </div>
            </div>

            <footer className="border-t border-slate-800 px-4 py-5 flex flex-col sm:flex-row items-center justify-between gap-2 font-mono text-xs text-slate-600 tracking-wider"><span>ROVER <span className="text-orange-500/60">PERSEVERANCE</span> · PROYECTO INTERMODULAR 2025/26</span><span>IES CARDENAL CISNEROS · 2DO SMR</span></footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
